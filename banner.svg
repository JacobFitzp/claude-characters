<svg width="800" height="175" viewBox="0 0 800 175" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#150d2a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="45%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-80%" width="160%" height="360%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="175" fill="url(#bg)" rx="12"/>
  <rect width="800" height="175" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" rx="12"/>

  <!-- Ambient glow behind title -->
  <ellipse cx="400" cy="72" rx="220" ry="45" fill="#a78bfa" fill-opacity="0.06"/>

  <!-- Scattered sparkles -->
  <text x="52"  y="38"  font-size="14" fill="#f97316" fill-opacity="0.55" font-family="sans-serif" filter="url(#softglow)">✦</text>
  <text x="118" y="22"  font-size="8"  fill="#ec4899" fill-opacity="0.45" font-family="sans-serif">✦</text>
  <text x="198" y="30"  font-size="6"  fill="#a78bfa" fill-opacity="0.35" font-family="sans-serif">✦</text>
  <text x="610" y="25"  font-size="7"  fill="#f97316" fill-opacity="0.35" font-family="sans-serif">✦</text>
  <text x="685" y="38"  font-size="12" fill="#a78bfa" fill-opacity="0.5"  font-family="sans-serif" filter="url(#softglow)">✦</text>
  <text x="748" y="22"  font-size="7"  fill="#ec4899" fill-opacity="0.4"  font-family="sans-serif">✦</text>
  <text x="38"  y="90"  font-size="5"  fill="#ec4899" fill-opacity="0.3"  font-family="sans-serif">·</text>
  <text x="763" y="85"  font-size="5"  fill="#a78bfa" fill-opacity="0.3"  font-family="sans-serif">·</text>

  <!-- Title -->
  <text x="400" y="75" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1.5"
        filter="url(#glow)">Claude Characters</text>

  <!-- Tagline -->
  <text x="400" y="101" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12" fill="#6e7681" letter-spacing="2.5">PICK A VOICE. ANY VOICE.</text>

  <!-- Character quote snippets -->
  <!-- Pirate -->
  <rect x="38"  y="116" width="218" height="34" rx="9" fill="#052e16" fill-opacity="0.8"/>
  <rect x="38"  y="116" width="218" height="34" rx="9" fill="none" stroke="#166534" stroke-width="1"/>
  <text x="57"  y="130" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="10" fill="#4ade80">☠ pirate</text>
  <text x="57"  y="144" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="10" fill="#86efac" fill-opacity="0.8">"Arrr, this bug be cursed!"</text>

  <!-- Butler -->
  <rect x="291" y="116" width="218" height="34" rx="9" fill="#1c1917" fill-opacity="0.8"/>
  <rect x="291" y="116" width="218" height="34" rx="9" fill="none" stroke="#44403c" stroke-width="1"/>
  <text x="310" y="130" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="10" fill="#d6d3d1">◆ butler</text>
  <text x="310" y="144" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="10" fill="#a8a29e" fill-opacity="0.8">"A minor irregularity, sir."</text>

  <!-- Chef -->
  <rect x="544" y="116" width="218" height="34" rx="9" fill="#450a0a" fill-opacity="0.8"/>
  <rect x="544" y="116" width="218" height="34" rx="9" fill="none" stroke="#991b1b" stroke-width="1"/>
  <text x="563" y="130" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="10" fill="#fca5a5">✦ chef</text>
  <text x="563" y="144" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="10" fill="#fda4a4" fill-opacity="0.8">"This code is RAW! Come ON!"</text>

</svg>
